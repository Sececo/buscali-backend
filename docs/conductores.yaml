# actualizar este archivo con la información del conductor.
openapi: 3.0.0
info:
  title: Microservicio de Conductores
  description: API para gestionar conductores en el sistema de gestión integral.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
paths:
  /conductores:
    get:
      summary: Obtener todos los conductores
      responses:
        '200':
          description: Lista de conductores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conductor'
    post:
      summary: Crear un nuevo conductor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Conductor'
      responses:
        '201':
          description: Conductor creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conductor'
  /conductores/{id}:
    get:
      summary: Obtener un conductor por ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID del conductor
          schema:
            type: string
      responses:
        '200':
          description: Conductor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conductor'
        '404':
          description: Conductor no encontrado
    put:
      summary: Actualizar un conductor
      parameters:
        - name: id
          in: path
          required: true
          description: ID del conductor
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Conductor'
      responses:
        '200':
          description: Conductor actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conductor'
        '404':
          description: Conductor no encontrado
    delete:
      summary: Eliminar un conductor
      parameters:
        - name: id
          in: path
          required: true
          description: ID del conductor
          schema:
            type: string
      responses:
        '204':
          description: Conductor eliminado
        '404':
          description: Conductor no encontrado
components:
  schemas:
    Conductor:
      type: object
      properties:
        id:
          type: string
        nombre:
          type: string
        email:
          type: string
        telefono:
          type: string
      required:
        - nombre
        - email
